<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Showcase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom animations for the background blobs */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 7s infinite;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }
        .animation-delay-4000 {
            animation-delay: 4s;
        }

        /* Responsive scaling with smooth ease-out transitions (no bounce) */
        .app-container {
            transition: transform 0.4s ease-out;
            transform-origin: center center;
        }

        /* Scale down based on screen width */
        @media (max-width: 480px) {
            .app-container {
                transform: scale(0.85);
            }
        }
        @media (max-width: 380px) {
            .app-container {
                transform: scale(0.75);
            }
        }

        /* Scale down based on screen height to prevent cutting off or requiring zoom */
        @media (max-height: 850px) {
            .app-container {
                transform: scale(0.85);
            }
        }
        @media (max-height: 740px) {
            .app-container {
                transform: scale(0.72);
            }
        }
        @media (max-height: 640px) {
            .app-container {
                transform: scale(0.62);
            }
        }
        
        /* Smooth, non-bouncy entry animation */
        .fade-in-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s ease-out forwards;
        }
        
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-gray-950 min-h-screen flex items-center justify-center overflow-hidden font-sans selection:bg-indigo-500 selection:text-white antialiased text-slate-200 relative">

    <!-- Animated Ambient Background -->
    <div class="fixed inset-0 w-full h-full z-0 flex items-center justify-center pointer-events-none">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-40 animate-blob"></div>
        <div class="absolute top-1/3 right-1/4 w-96 h-96 bg-indigo-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-40 animate-blob animation-delay-2000"></div>
        <div class="absolute -bottom-8 left-1/3 w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-40 animate-blob animation-delay-4000"></div>
    </div>

    <!-- Main Content -->
    <main class="relative z-10 flex flex-col items-center justify-center w-full px-4 fade-in-up">
        
        <!-- Header / Title -->
        <div class="mb-6 text-center">
            <h1 class="text-3xl font-light tracking-tight text-white mb-1">App Showcase</h1>
            <p class="text-gray-400 text-xs tracking-wide uppercase shadow-sm">Interactive Preview</p>
        </div>

        <!-- Glassmorphic Device Mockup Container -->
        <div class="app-container relative group">
            
            <!-- Outer Glow -->
            <div class="absolute -inset-0.5 bg-gradient-to-b from-indigo-500 to-purple-600 rounded-[3.2rem] blur opacity-30 group-hover:opacity-40 transition duration-500"></div>
            
            <!-- Device Bezel -->
            <div class="relative bg-gray-900 border-[12px] border-gray-900 rounded-[3rem] shadow-2xl ring-1 ring-white/10 flex flex-col items-center justify-center">
                
                <!-- Notch / Camera Hole -->
                <div class="absolute top-0 inset-x-0 h-7 flex justify-center z-20 pointer-events-none">
                    <div class="w-36 h-7 bg-gray-900 rounded-b-3xl relative flex items-center justify-center shadow-[0_2px_10px_rgba(0,0,0,0.5)]">
                        <div class="w-16 h-1.5 bg-gray-800 rounded-full"></div>
                        <div class="w-2 h-2 bg-blue-900/50 rounded-full absolute right-4 shadow-[inset_0_1px_2px_rgba(0,0,0,0.8)] border border-gray-800/50"></div>
                    </div>
                </div>

                <!-- Iframe Wrapper -->
                <div class="w-[392px] h-[620px] bg-white rounded-[2.2rem] overflow-hidden flex items-center justify-center relative shadow-inner">
                    
                    <!-- Loading Skeleton (Fades smoothly without bouncing) -->
                    <div id="loading-state" class="absolute inset-0 bg-gray-950 flex flex-col items-center justify-center z-0 transition-opacity duration-300">
                        <div class="w-10 h-10 border-4 border-slate-800 border-t-indigo-500 rounded-full animate-spin mb-4"></div>
                        <p class="text-gray-400 text-sm font-medium">Loading Experience...</p>
                    </div>

                    <!-- The Embedded App -->
                    <iframe 
                        id="app-iframe"
                        width="392" 
                        height="620" 
                        style="border: 0px; background: transparent; position: relative; z-index: 10;" 
                        src="https://studio.code.org/projects/applab/zF6j96E2-181N-289q-qE9z-9Fb8T9b96jEq/embed?nosource"
                        title="Embedded AppLab Project"
                        allow="camera; microphone"
                        onload="document.getElementById('loading-state').style.opacity = '0'; setTimeout(() => document.getElementById('loading-state').style.display = 'none', 300);">
                    </iframe>
                </div>

                <!-- Home Indicator (Bottom Bar) -->
                <div class="absolute bottom-2 inset-x-0 h-4 flex justify-center z-20 pointer-events-none">
                    <div class="w-32 h-1.5 bg-gray-600/50 rounded-full backdrop-blur-sm"></div>
                </div>
                
            </div>
        </div>
        
    </main>

    <script>
        const container = document.querySelector('.app-container');
        
        container.addEventListener('mousemove', (e) => {
            if (window.innerWidth < 768) return;
            
            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            // Subtle rotation limits (max 3 degrees)
            const rotateX = ((y - centerY) / centerY) * -3; 
            const rotateY = ((x - centerX) / centerX) * 3;
            
            // Speed up response slightly during mouse movement for high-performance feel
            container.style.transition = 'transform 0.1s ease-out';
            container.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.01, 1.01, 1.01)`;
        });

        container.addEventListener('mouseleave', () => {
            // Smoothly ease back to default without bounce
            container.style.transition = 'transform 0.4s ease-out';
            container.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
        });
    </script>
</body>
</html>
